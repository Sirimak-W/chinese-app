<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>学 Mandarin — Daily Chinese</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- 1. Nav bar -->
    <nav class="nav">
      <h1 class="nav-title">学 <span>Mandarin</span></h1>
      <div class="streak" id="streak" title="Daily streak">
        <span class="flame">🔥</span>
        <span id="streak-count">0</span>-day streak
      </div>
    </nav>

    <!-- 2. Stats row -->
    <section class="stats">
      <div class="stat-card">
        <div class="stat-value" id="stat-learned">0</div>
        <div class="stat-label">Words learned</div>
        <div class="stat-sub" id="stat-learned-today">+0 today</div>
      </div>
      <div class="stat-card stat-due">
        <div class="stat-value" id="stat-due">0</div>
        <div class="stat-label">Due for review</div>
        <div class="stat-sub">today</div>
      </div>
      <div class="stat-card stat-acc">
        <div class="stat-value" id="stat-accuracy">—</div>
        <div class="stat-label">Accuracy</div>
        <div class="stat-sub">last 7 days</div>
      </div>
    </section>

    <!-- 3. Flashcard -->
    <section class="flashcard" id="flashcard">
      <div class="card-badge">
        <span class="badge-hsk" id="badge-hsk">HSK 1</span>
        <span class="badge-mode" id="badge-mode">Hanzi → Meaning</span>
        <span class="badge-reviews" id="badge-reviews">0 reviews</span>
      </div>

      <div class="card-main">
        <div class="hanzi" id="card-hanzi">学习</div>
        <div class="pinyin" id="card-pinyin">xuéxí</div>
        <div class="meaning" id="card-meaning">to study, to learn</div>
      </div>

      <button class="listen-btn" id="listen-btn" title="Listen (zh-CN)">
        🔊 Listen
      </button>

      <button class="reveal-btn" id="reveal-btn">Show Answer</button>

      <div class="answer-block" id="answer-block" hidden>
        <div class="examples" id="examples"></div>

        <div class="compounds" id="compounds"></div>

        <div class="produce">
          <h3>Write your own sentence</h3>
          <textarea id="my-sentence-input" placeholder="用这个词造一个句子…"></textarea>
          <button class="save-sentence-btn" id="save-sentence-btn">Save sentence</button>
          <ul class="my-sentences-list" id="my-sentences-list"></ul>
        </div>
      </div>
    </section>

    <!-- 4. SRS buttons -->
    <section class="srs" id="srs" hidden>
      <button class="srs-btn again" data-grade="again">Again<span id="again-sub">10 min</span></button>
      <button class="srs-btn hard"  data-grade="hard">Hard<span id="hard-sub">1 day</span></button>
      <button class="srs-btn good"  data-grade="good">Good<span id="good-sub">3 days</span></button>
      <button class="srs-btn easy"  data-grade="easy">Easy<span id="easy-sub">7 days</span></button>
    </section>

    <!-- 5. Year activity heatmap -->
    <section class="heatmap-section">
      <h2 class="section-title">Activity</h2>
      <div class="heatmap-scroll">
        <div class="heatmap" id="heatmap"></div>
      </div>
      <div class="heatmap-footer">
        <span id="heatmap-total">0 sessions in the last year</span>
        <div class="legend">
          Less
          <span class="legend-cell level-0"></span>
          <span class="legend-cell level-1"></span>
          <span class="legend-cell level-2"></span>
          <span class="legend-cell level-3"></span>
          <span class="legend-cell level-4"></span>
          More
        </div>
      </div>
    </section>
  </div>

  <div class="tooltip" id="tooltip"></div>
  <script src="app.js"></script>
</body>
</html>
